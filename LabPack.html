<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#17333a" />
  <title>LabPack - 研究室出張持ち物管理</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --surface: #ffffff;
      --surface-2: #eef4f4;
      --text: #1d292d;
      --muted: #66777d;
      --line: #dce6e8;
      --dark: #17333a;
      --accent: #0c9f91;
      --accent-dark: #087a70;
      --accent-soft: #d9f3ef;
      --warning: #d17a15;
      --warning-soft: #fff1dc;
      --danger: #c64b4b;
      --danger-soft: #fde8e8;
      --success: #23865d;
      --shadow: 0 10px 30px rgba(25, 52, 59, 0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    img { max-width: 100%; display: block; }
    .hidden { display: none !important; }

    .app-shell { min-height: 100vh; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px clamp(16px, 4vw, 42px);
      color: white;
      background: linear-gradient(135deg, var(--dark), #24515b);
      box-shadow: 0 4px 16px rgba(23, 51, 58, 0.18);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 13px;
      display: grid; place-items: center;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.18);
      font-size: 23px;
    }
    .brand h1 { margin: 0; font-size: 18px; letter-spacing: .02em; }
    .brand p { margin: 2px 0 0; font-size: 12px; opacity: .74; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .desktop-nav { display: none; gap: 8px; }
    .nav-btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      color: rgba(255,255,255,.78);
      background: transparent;
      font-weight: 700;
    }
    .nav-btn:hover, .nav-btn.active { color: white; background: rgba(255,255,255,.13); }

    main { width: min(1180px, 100%); margin: 0 auto; padding: 22px 16px 96px; }
    .page { animation: fadeIn .18s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .page-head h2 { margin: 0; font-size: clamp(23px, 4vw, 32px); }
    .page-head p { margin: 6px 0 0; color: var(--muted); line-height: 1.65; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 15px;
      border: 1px solid transparent;
      border-radius: 13px;
      font-weight: 800;
      transition: transform .12s, box-shadow .12s, background .12s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { color: white; background: var(--accent); box-shadow: 0 7px 18px rgba(12,159,145,.22); }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { color: var(--dark); background: var(--surface); border-color: var(--line); }
    .btn-secondary:hover { background: var(--surface-2); }
    .btn-danger { color: var(--danger); background: var(--danger-soft); border-color: #f6caca; }
    .btn-ghost { color: var(--muted); background: transparent; }
    .btn-small { min-height: 36px; padding: 7px 11px; border-radius: 10px; font-size: 13px; }
    .icon-btn {
      width: 40px; height: 40px; border: 1px solid var(--line); border-radius: 12px;
      display: grid; place-items: center; background: white; color: var(--text); font-size: 18px;
    }

    .hero {
      display: grid;
      gap: 18px;
      padding: 24px;
      margin-bottom: 18px;
      border-radius: 24px;
      color: white;
      background:
        radial-gradient(circle at 90% 20%, rgba(26, 211, 193, .23), transparent 30%),
        linear-gradient(135deg, #17333a 10%, #24515b 65%, #1f696d);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero h2 { margin: 0; font-size: clamp(26px, 6vw, 42px); line-height: 1.2; }
    .hero p { margin: 10px 0 0; max-width: 650px; color: rgba(255,255,255,.75); line-height: 1.75; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .hero .btn-secondary { background: rgba(255,255,255,.11); color: white; border-color: rgba(255,255,255,.2); }

    .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-bottom: 22px; }
    .stat-card { padding: 17px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--line); }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 800; }
    .stat-value { display: block; margin-top: 6px; font-size: 27px; font-weight: 900; color: var(--dark); }
    .stat-note { margin-top: 4px; font-size: 12px; color: var(--muted); }

    .section-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 17px; box-shadow: 0 5px 20px rgba(25,52,59,.04); }
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .section-title h3 { margin: 0; font-size: 18px; }
    .section-title span { color: var(--muted); font-size: 13px; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .search-wrap { position: relative; flex: 1 1 220px; }
    .search-wrap input { padding-left: 41px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    input, textarea, select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      color: var(--text);
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(12,159,145,.12); }
    textarea { min-height: 90px; resize: vertical; }
    label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 6px; }
    .field { margin-bottom: 14px; }
    .field-hint { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 0 14px; }

    .trip-list { display: grid; gap: 12px; }
    .trip-card {
      position: relative;
      display: grid;
      gap: 13px;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: white;
      transition: transform .12s, box-shadow .12s, border-color .12s;
    }
    .trip-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #bfd4d6; }
    .trip-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .trip-card h3 { margin: 0; font-size: 17px; }
    .trip-meta { display: flex; flex-wrap: wrap; gap: 7px 12px; margin-top: 7px; color: var(--muted); font-size: 13px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; min-height: 27px; padding: 4px 9px; border-radius: 999px; background: var(--surface-2); color: #466168; font-size: 12px; font-weight: 800; }
    .chip-accent { background: var(--accent-soft); color: var(--accent-dark); }
    .chip-warning { background: var(--warning-soft); color: #92540f; }
    .progress-row { display: grid; gap: 6px; }
    .progress-label { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .progress { height: 8px; border-radius: 999px; overflow: hidden; background: #e9eff0; }
    .progress > span { display: block; height: 100%; border-radius: inherit; background: var(--accent); transition: width .25s ease; }
    .progress.return > span { background: var(--success); }
    .trip-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .item-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .item-card {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      transition: transform .12s, box-shadow .12s, opacity .12s;
    }
    .item-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .item-card.checked { opacity: .64; }
    .item-card.checked .item-image img { filter: grayscale(.7); }
    .item-image { position: relative; aspect-ratio: 4/3; background: #e8efef; overflow: hidden; cursor: pointer; }
    .item-image img { width: 100%; height: 100%; object-fit: cover; transition: filter .15s; }
    .item-placeholder { width: 100%; height: 100%; display: grid; place-items: center; font-size: 42px; color: #81969b; background: linear-gradient(135deg,#edf3f3,#dbe7e8); }
    .check-badge {
      position: absolute; top: 9px; right: 9px;
      width: 31px; height: 31px; border-radius: 50%;
      display: grid; place-items: center;
      color: white; background: var(--accent); box-shadow: 0 3px 10px rgba(0,0,0,.18); font-weight: 900;
    }
    .item-body { padding: 12px; }
    .item-name { margin: 0; font-size: 15px; font-weight: 900; word-break: break-word; }
    .item-category { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .item-controls { display: flex; gap: 7px; margin-top: 11px; }
    .check-btn {
      flex: 1;
      min-width: 0;
      min-height: 38px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
    }
    .check-btn.on { color: white; background: var(--accent); border-color: var(--accent); }
    .check-btn.return.on { background: var(--success); border-color: var(--success); }

    .empty-state { padding: 44px 18px; text-align: center; border: 1px dashed #c8d7da; border-radius: 18px; background: rgba(255,255,255,.55); }
    .empty-icon { font-size: 44px; }
    .empty-state h3 { margin: 10px 0 5px; }
    .empty-state p { margin: 0 auto 16px; max-width: 450px; color: var(--muted); line-height: 1.6; }

    .trip-detail-head {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
      padding: 18px;
      border-radius: 20px;
      color: white;
      background: linear-gradient(135deg, var(--dark), #2c6269);
    }
    .trip-detail-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .trip-detail-head h2 { margin: 0; font-size: 24px; }
    .trip-detail-head p { margin: 6px 0 0; color: rgba(255,255,255,.73); }
    .trip-detail-head .icon-btn { color: white; background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); }
    .detail-progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-progress-card { padding: 12px; border-radius: 13px; background: rgba(255,255,255,.10); }
    .detail-progress-card strong { display: block; font-size: 21px; margin-top: 3px; }
    .detail-progress-card span { font-size: 12px; color: rgba(255,255,255,.72); }

    .segmented { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; padding: 4px; margin-bottom: 14px; border-radius: 13px; background: #e5eeee; }
    .segment-btn { min-height: 39px; border: 0; border-radius: 10px; background: transparent; color: var(--muted); font-weight: 900; font-size: 13px; }
    .segment-btn.active { background: white; color: var(--dark); box-shadow: 0 3px 10px rgba(25,52,59,.08); }

    .bottom-nav {
      position: fixed;
      left: 50%; bottom: 12px; z-index: 30;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: calc(100% - 24px);
      max-width: 500px;
      padding: 6px;
      border: 1px solid rgba(220,230,232,.9);
      border-radius: 19px;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 35px rgba(23,51,58,.20);
    }
    .bottom-nav button { border: 0; border-radius: 14px; padding: 8px 5px; background: transparent; color: var(--muted); font-size: 11px; font-weight: 900; }
    .bottom-nav button span { display: block; font-size: 20px; line-height: 1.1; margin-bottom: 3px; }
    .bottom-nav button.active { color: var(--accent-dark); background: var(--accent-soft); }

    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100;
      display: grid; align-items: end;
      padding: 0;
      background: rgba(12, 28, 32, .56);
      backdrop-filter: blur(3px);
    }
    .modal {
      width: 100%; max-height: 92vh; overflow: auto;
      padding: 20px;
      border-radius: 24px 24px 0 0;
      background: white;
      box-shadow: 0 -15px 50px rgba(0,0,0,.2);
      animation: sheetUp .18s ease-out;
    }
    @keyframes sheetUp { from { transform: translateY(20px); opacity: .7; } to { transform: none; opacity: 1; } }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; }
    .modal-head h3 { margin: 0; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 18px; }
    .photo-picker {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%; min-height: 180px;
      border: 2px dashed #b9cbce;
      border-radius: 15px;
      overflow: hidden;
      background: var(--surface-2);
      color: var(--muted);
      text-align: center;
    }
    .photo-picker img { width: 100%; height: 220px; object-fit: cover; }
    .photo-picker input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .photo-picker-text { padding: 20px; }
    .photo-picker-text strong { display: block; color: var(--dark); margin-bottom: 5px; }
    .detail-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 16px; background: var(--surface-2); }
    .detail-info { display: grid; gap: 11px; margin-top: 16px; }
    .detail-row { padding: 12px; border-radius: 12px; background: var(--surface-2); }
    .detail-row small { display: block; margin-bottom: 4px; color: var(--muted); font-weight: 800; }
    .detail-row p { margin: 0; line-height: 1.6; white-space: pre-wrap; }

    .toast-wrap { position: fixed; top: 77px; right: 14px; z-index: 200; display: grid; gap: 8px; pointer-events: none; }
    .toast { padding: 12px 15px; border-radius: 12px; color: white; background: var(--dark); box-shadow: var(--shadow); animation: toastIn .18s ease-out; font-weight: 800; font-size: 13px; }
    @keyframes toastIn { from { transform: translateY(-7px); opacity: 0; } to { transform: none; opacity: 1; } }

    @media (min-width: 720px) {
      main { padding: 30px 28px 50px; }
      .desktop-nav { display: flex; }
      .bottom-nav { display: none; }
      .hero { grid-template-columns: 1fr auto; align-items: center; padding: 34px; }
      .stats-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .trip-list { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .item-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .modal-backdrop { align-items: center; padding: 24px; }
      .modal { width: min(640px, 100%); margin: auto; border-radius: 22px; }
    }
    @media (min-width: 1000px) {
      .item-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .trip-list { grid-template-columns: repeat(3, minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">🧰</div>
        <div>
          <h1>LabPack</h1>
          <p>研究室出張持ち物管理</p>
        </div>
      </div>
      <nav class="desktop-nav" aria-label="メインナビゲーション">
        <button class="nav-btn active" data-page="home">ホーム</button>
        <button class="nav-btn" data-page="trips">出張リスト</button>
        <button class="nav-btn" data-page="template">テンプレート</button>
      </nav>
    </header>

    <main>
      <section id="page-home" class="page"></section>
      <section id="page-trips" class="page hidden"></section>
      <section id="page-template" class="page hidden"></section>
      <section id="page-trip-detail" class="page hidden"></section>
    </main>

    <nav class="bottom-nav" aria-label="モバイルナビゲーション">
      <button class="active" data-page="home"><span>🏠</span>ホーム</button>
      <button data-page="trips"><span>🧳</span>出張</button>
      <button data-page="template"><span>🧰</span>テンプレート</button>
    </nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-wrap" class="toast-wrap"></div>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'labpack_data_v1';
      const defaultItems = [
        { id: cryptoId(), name: '工具セット', category: '工具', memo: 'ドライバー、六角レンチ、スパナ一式', photo: '', createdAt: Date.now() },
        { id: cryptoId(), name: 'ノートPC', category: '電子機器', memo: '制御・ログ確認用。充電器も確認する。', photo: '', createdAt: Date.now() },
        { id: cryptoId(), name: '延長コード', category: '電源', memo: '屋外用。長さ10m。', photo: '', createdAt: Date.now() },
        { id: cryptoId(), name: '予備バッテリー', category: '電源', memo: '充電残量を事前確認。', photo: '', createdAt: Date.now() }
      ];

      let state = loadState();
      let currentPage = 'home';
      let currentTripId = null;
      let detailFilter = 'all';
      let templateSearch = '';
      let tripSearch = '';
      let detailSearch = '';

      const els = {
        pages: {
          home: document.getElementById('page-home'),
          trips: document.getElementById('page-trips'),
          template: document.getElementById('page-template'),
          tripDetail: document.getElementById('page-trip-detail')
        },
        modalRoot: document.getElementById('modal-root'),
        toastWrap: document.getElementById('toast-wrap')
      };

      function cryptoId() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (saved && Array.isArray(saved.templateItems) && Array.isArray(saved.trips)) return saved;
        } catch (e) {
          console.warn('保存データの読み込みに失敗しました。', e);
        }
        return { templateItems: defaultItems, trips: [] };
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function esc(value = '') {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function formatDate(dateStr) {
        if (!dateStr) return '日程未設定';
        const d = new Date(dateStr + 'T00:00:00');
        return new Intl.DateTimeFormat('ja-JP', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
      }

      function dateRange(start, end) {
        if (!start && !end) return '日程未設定';
        if (start && end && start !== end) return `${formatDate(start)} 〜 ${formatDate(end)}`;
        return formatDate(start || end);
      }

      function percent(done, total) {
        return total ? Math.round(done / total * 100) : 0;
      }

      function getCounts(trip) {
        const total = trip.items.length;
        const carried = trip.items.filter(i => i.carried).length;
        const returned = trip.items.filter(i => i.returned).length;
        return { total, carried, returned };
      }

      function itemImage(item) {
        return item.photo
          ? `<img src="${item.photo}" alt="${esc(item.name)}の写真">`
          : `<div class="item-placeholder" aria-label="写真なし">🧰</div>`;
      }

      function showPage(page, tripId = null) {
        currentPage = page;
        if (tripId) currentTripId = tripId;
        Object.values(els.pages).forEach(p => p.classList.add('hidden'));
        const pageKey = page === 'tripDetail' ? 'tripDetail' : page;
        els.pages[pageKey].classList.remove('hidden');
        document.querySelectorAll('[data-page]').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.page === page);
        });
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function render() {
        renderHome();
        renderTrips();
        renderTemplate();
        if (currentTripId) renderTripDetail();
      }

      function renderHome() {
        const latest = [...state.trips].sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)).slice(0, 3);
        const totalItems = state.templateItems.length;
        const activeTrips = state.trips.filter(t => getCounts(t).returned < getCounts(t).total).length;
        const totalPendingCarry = state.trips.reduce((sum,t) => sum + (getCounts(t).total - getCounts(t).carried), 0);
        const totalPendingReturn = state.trips.reduce((sum,t) => sum + (getCounts(t).total - getCounts(t).returned), 0);

        els.pages.home.innerHTML = `
          <div class="hero">
            <div>
              <h2>忘れ物、<br>してませんか？</h2>
              <p>テンプレートから出張リストを作成し、持参と返却を写真付きで確実にチェックできます。データはこのブラウザ内に保存されます。</p>
            </div>
            <div class="hero-actions">
              <button class="btn btn-primary" id="home-create-trip">＋ 出張を作成</button>
              <button class="btn btn-secondary" id="home-add-item">＋ 工具を登録</button>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">テンプレート登録数</span><strong class="stat-value">${totalItems}</strong><div class="stat-note">工具・機材</div></div>
            <div class="stat-card"><span class="stat-label">未完了の出張</span><strong class="stat-value">${activeTrips}</strong><div class="stat-note">返却確認前を含む</div></div>
            <div class="stat-card"><span class="stat-label">持参未確認</span><strong class="stat-value">${totalPendingCarry}</strong><div class="stat-note">全出張の合計</div></div>
            <div class="stat-card"><span class="stat-label">返却未確認</span><strong class="stat-value">${totalPendingReturn}</strong><div class="stat-note">紛失防止に要確認</div></div>
          </div>

          <div class="section-card">
            <div class="section-title">
              <div><h3>最近の出張</h3><span>新しい順に表示</span></div>
              <button class="btn btn-secondary btn-small" id="home-see-trips">すべて見る</button>
            </div>
            ${latest.length ? `<div class="trip-list">${latest.map(tripCardHtml).join('')}</div>` : emptyHtml('🧳','まだ出張リストがありません','テンプレートをもとに、最初の出張リストを作成しましょう。','出張を作成','empty-create-trip')}
          </div>
        `;

        bindCommonTripCardActions(els.pages.home);
        document.getElementById('home-create-trip')?.addEventListener('click', openTripModal);
        document.getElementById('empty-create-trip')?.addEventListener('click', openTripModal);
        document.getElementById('home-add-item')?.addEventListener('click', () => openItemModal({ mode: 'template' }));
        document.getElementById('home-see-trips')?.addEventListener('click', () => showPage('trips'));
      }

      function renderTrips() {
        const q = tripSearch.trim().toLowerCase();
        const trips = [...state.trips]
          .filter(t => !q || [t.name,t.destination,t.purpose].some(v => String(v || '').toLowerCase().includes(q)))
          .sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

        els.pages.trips.innerHTML = `
          <div class="page-head">
            <div><h2>出張リスト</h2><p>出張ごとに持参・返却状況を独立して管理します。</p></div>
            <button class="btn btn-primary" id="trips-create">＋ 新規出張</button>
          </div>
          <div class="toolbar">
            <div class="search-wrap"><span class="search-icon">🔎</span><input id="trip-search" type="search" placeholder="出張名・目的地・目的で検索" value="${esc(tripSearch)}"></div>
          </div>
          ${trips.length ? `<div class="trip-list">${trips.map(tripCardHtml).join('')}</div>` : emptyHtml('🧳', q ? '条件に一致する出張がありません' : '出張リストがありません', q ? '検索条件を変更してください。' : 'テンプレートから新しい出張を作成できます。', q ? '' : '出張を作成', q ? '' : 'trips-empty-create')}
        `;

        document.getElementById('trips-create')?.addEventListener('click', openTripModal);
        document.getElementById('trips-empty-create')?.addEventListener('click', openTripModal);
        document.getElementById('trip-search')?.addEventListener('input', e => { tripSearch = e.target.value; renderTrips(); document.getElementById('trip-search')?.focus(); });
        bindCommonTripCardActions(els.pages.trips);
      }

      function tripCardHtml(trip) {
        const c = getCounts(trip);
        return `
          <article class="trip-card" data-trip-id="${trip.id}">
            <div class="trip-card-top">
              <div>
                <h3>${esc(trip.name)}</h3>
                <div class="trip-meta">
                  <span>📅 ${esc(dateRange(trip.startDate, trip.endDate))}</span>
                  <span>📍 ${esc(trip.destination || '目的地未設定')}</span>
                </div>
              </div>
              <span class="chip ${c.returned === c.total && c.total ? 'chip-accent' : c.carried < c.total ? 'chip-warning' : ''}">${c.total}点</span>
            </div>
            <div class="progress-row">
              <div class="progress-label"><span>持参</span><span>${c.carried}/${c.total}</span></div>
              <div class="progress"><span style="width:${percent(c.carried,c.total)}%"></span></div>
            </div>
            <div class="progress-row">
              <div class="progress-label"><span>返却</span><span>${c.returned}/${c.total}</span></div>
              <div class="progress return"><span style="width:${percent(c.returned,c.total)}%"></span></div>
            </div>
            <div class="trip-actions">
              <button class="btn btn-primary btn-small trip-open">リストを開く</button>
              <button class="btn btn-secondary btn-small trip-edit">編集</button>
              <button class="btn btn-danger btn-small trip-delete">削除</button>
            </div>
          </article>
        `;
      }

      function bindCommonTripCardActions(root) {
        root.querySelectorAll('.trip-open').forEach(btn => btn.addEventListener('click', () => {
          const id = btn.closest('[data-trip-id]').dataset.tripId;
          showPage('tripDetail', id);
        }));
        root.querySelectorAll('.trip-edit').forEach(btn => btn.addEventListener('click', () => {
          const id = btn.closest('[data-trip-id]').dataset.tripId;
          openTripModal(state.trips.find(t => t.id === id));
        }));
        root.querySelectorAll('.trip-delete').forEach(btn => btn.addEventListener('click', () => {
          const id = btn.closest('[data-trip-id]').dataset.tripId;
          const trip = state.trips.find(t => t.id === id);
          openConfirm(`「${trip.name}」を削除しますか？`, '持参・返却のチェック履歴も削除されます。', () => {
            state.trips = state.trips.filter(t => t.id !== id);
            saveState();
            toast('出張リストを削除しました');
            render();
          });
        }));
      }

      function renderTemplate() {
        const categories = [...new Set(state.templateItems.map(i => i.category).filter(Boolean))].sort();
        const q = templateSearch.trim().toLowerCase();
        const items = state.templateItems.filter(i => !q || [i.name,i.category,i.memo].some(v => String(v || '').toLowerCase().includes(q)));

        els.pages.template.innerHTML = `
          <div class="page-head">
            <div><h2>持ち物テンプレート</h2><p>出張作成時に、この一覧が写真・メモを含めてコピーされます。</p></div>
            <button class="btn btn-primary" id="template-add">＋ アイテム追加</button>
          </div>
          <div class="toolbar">
            <div class="search-wrap"><span class="search-icon">🔎</span><input id="template-search" type="search" placeholder="名前・カテゴリ・メモで検索" value="${esc(templateSearch)}"></div>
            ${categories.length ? `<select id="category-jump" style="max-width:190px"><option value="">カテゴリ一覧</option>${categories.map(c => `<option>${esc(c)}</option>`).join('')}</select>` : ''}
          </div>
          ${items.length ? `<div class="item-grid">${items.map(i => templateItemHtml(i)).join('')}</div>` : emptyHtml('🧰', q ? '条件に一致するアイテムがありません' : 'テンプレートが空です', q ? '検索条件を変更してください。' : '工具や機材を写真付きで登録しましょう。', q ? '' : 'アイテムを追加', q ? '' : 'template-empty-add')}
        `;

        document.getElementById('template-add')?.addEventListener('click', () => openItemModal({ mode: 'template' }));
        document.getElementById('template-empty-add')?.addEventListener('click', () => openItemModal({ mode: 'template' }));
        document.getElementById('template-search')?.addEventListener('input', e => { templateSearch = e.target.value; renderTemplate(); document.getElementById('template-search')?.focus(); });
        document.getElementById('category-jump')?.addEventListener('change', e => { templateSearch = e.target.value; renderTemplate(); });

        els.pages.template.querySelectorAll('.item-view').forEach(el => el.addEventListener('click', () => {
          const item = state.templateItems.find(i => i.id === el.closest('[data-item-id]').dataset.itemId);
          openItemDetail(item);
        }));
        els.pages.template.querySelectorAll('.item-edit').forEach(btn => btn.addEventListener('click', () => {
          const item = state.templateItems.find(i => i.id === btn.closest('[data-item-id]').dataset.itemId);
          openItemModal({ mode: 'template', item });
        }));
        els.pages.template.querySelectorAll('.item-delete').forEach(btn => btn.addEventListener('click', () => {
          const id = btn.closest('[data-item-id]').dataset.itemId;
          const item = state.templateItems.find(i => i.id === id);
          openConfirm(`「${item.name}」をテンプレートから削除しますか？`, 'すでに作成済みの出張リストには影響しません。', () => {
            state.templateItems = state.templateItems.filter(i => i.id !== id);
            saveState();
            toast('テンプレートから削除しました');
            render();
          });
        }));
      }

      function templateItemHtml(item) {
        return `
          <article class="item-card" data-item-id="${item.id}">
            <div class="item-image item-view">${itemImage(item)}</div>
            <div class="item-body">
              <h3 class="item-name">${esc(item.name)}</h3>
              <div class="item-category">${esc(item.category || '未分類')}</div>
              <div class="item-controls">
                <button class="check-btn item-edit">編集</button>
                <button class="check-btn item-delete">削除</button>
              </div>
            </div>
          </article>
        `;
      }

      function renderTripDetail() {
        const trip = state.trips.find(t => t.id === currentTripId);
        if (!trip) {
          currentTripId = null;
          showPage('trips');
          return;
        }
        const c = getCounts(trip);
        const q = detailSearch.trim().toLowerCase();
        let items = trip.items.filter(i => !q || [i.name,i.category,i.memo].some(v => String(v || '').toLowerCase().includes(q)));
        if (detailFilter === 'carry') items = items.filter(i => !i.carried);
        if (detailFilter === 'return') items = items.filter(i => !i.returned);

        els.pages.tripDetail.innerHTML = `
          <div class="trip-detail-head">
            <div class="trip-detail-top">
              <div>
                <button class="btn btn-ghost btn-small" id="detail-back" style="color:white;padding-left:0">← 出張一覧へ</button>
                <h2>${esc(trip.name)}</h2>
                <p>${esc(dateRange(trip.startDate,trip.endDate))} ・ ${esc(trip.destination || '目的地未設定')}</p>
              </div>
              <button class="icon-btn" id="detail-edit" title="出張情報を編集">✎</button>
            </div>
            <div class="detail-progress-grid">
              <div class="detail-progress-card"><span>持参チェック</span><strong>${c.carried} / ${c.total}</strong></div>
              <div class="detail-progress-card"><span>返却チェック</span><strong>${c.returned} / ${c.total}</strong></div>
            </div>
          </div>

          <div class="toolbar">
            <div class="search-wrap"><span class="search-icon">🔎</span><input id="detail-search" type="search" placeholder="アイテムを検索" value="${esc(detailSearch)}"></div>
            <button class="btn btn-primary" id="detail-add">＋ アイテム追加</button>
          </div>
          <div class="segmented">
            <button class="segment-btn ${detailFilter === 'all' ? 'active' : ''}" data-filter="all">すべて</button>
            <button class="segment-btn ${detailFilter === 'carry' ? 'active' : ''}" data-filter="carry">持参未確認</button>
            <button class="segment-btn ${detailFilter === 'return' ? 'active' : ''}" data-filter="return">返却未確認</button>
          </div>
          ${items.length ? `<div class="item-grid">${items.map(i => tripItemHtml(i)).join('')}</div>` : emptyHtml('✅','該当するアイテムはありません', detailFilter === 'all' ? '検索条件を変更してください。' : 'この条件のチェックは完了しています。','','')}
        `;

        document.getElementById('detail-back')?.addEventListener('click', () => showPage('trips'));
        document.getElementById('detail-edit')?.addEventListener('click', () => openTripModal(trip));
        document.getElementById('detail-add')?.addEventListener('click', () => openAddTripItemModal(trip));
        document.getElementById('detail-search')?.addEventListener('input', e => { detailSearch = e.target.value; renderTripDetail(); document.getElementById('detail-search')?.focus(); });
        els.pages.tripDetail.querySelectorAll('.segment-btn').forEach(btn => btn.addEventListener('click', () => { detailFilter = btn.dataset.filter; renderTripDetail(); }));
        els.pages.tripDetail.querySelectorAll('.item-view').forEach(el => el.addEventListener('click', () => {
          const item = trip.items.find(i => i.id === el.closest('[data-item-id]').dataset.itemId);
          openItemDetail(item);
        }));
        els.pages.tripDetail.querySelectorAll('.carry-btn').forEach(btn => btn.addEventListener('click', () => toggleTripCheck(trip.id, btn.closest('[data-item-id]').dataset.itemId, 'carried')));
        els.pages.tripDetail.querySelectorAll('.return-btn').forEach(btn => btn.addEventListener('click', () => toggleTripCheck(trip.id, btn.closest('[data-item-id]').dataset.itemId, 'returned')));
        els.pages.tripDetail.querySelectorAll('.trip-item-more').forEach(btn => btn.addEventListener('click', () => {
          const item = trip.items.find(i => i.id === btn.closest('[data-item-id]').dataset.itemId);
          openTripItemActions(trip, item);
        }));
      }

      function tripItemHtml(item) {
        const checkedForFilter = detailFilter === 'return' ? item.returned : item.carried;
        return `
          <article class="item-card ${checkedForFilter ? 'checked' : ''}" data-item-id="${item.id}">
            <div class="item-image item-view">
              ${itemImage(item)}
              ${(item.carried && item.returned) ? '<span class="check-badge">✓</span>' : ''}
            </div>
            <div class="item-body">
              <div style="display:flex;justify-content:space-between;gap:7px;align-items:start">
                <div style="min-width:0"><h3 class="item-name">${esc(item.name)}</h3><div class="item-category">${esc(item.category || '未分類')}</div></div>
                <button class="icon-btn trip-item-more" style="width:32px;height:32px;font-size:14px;flex:none">⋮</button>
              </div>
              <div class="item-controls">
                <button class="check-btn carry-btn ${item.carried ? 'on' : ''}">${item.carried ? '✓ 持参済み' : '持参'}</button>
                <button class="check-btn return return-btn ${item.returned ? 'on' : ''}">${item.returned ? '✓ 返却済み' : '返却'}</button>
              </div>
            </div>
          </article>
        `;
      }

      function toggleTripCheck(tripId, itemId, key) {
        const trip = state.trips.find(t => t.id === tripId);
        const item = trip?.items.find(i => i.id === itemId);
        if (!item) return;
        item[key] = !item[key];
        if (key === 'carried' && !item.carried) item.returned = false;
        if (key === 'returned' && item.returned) item.carried = true;
        saveState();
        renderTripDetail();
      }

      function openTripModal(existing = null) {
        const edit = Boolean(existing);
        openModal(`
          <div class="modal-head"><h3>${edit ? '出張情報を編集' : 'テンプレートから出張を作成'}</h3><button class="icon-btn modal-close">×</button></div>
          <form id="trip-form">
            <div class="field"><label for="trip-name">出張名 *</label><input id="trip-name" required maxlength="80" value="${esc(existing?.name || '')}" placeholder="例：AI-Formula 合同テスト"></div>
            <div class="form-grid">
              <div class="field"><label for="trip-start">開始日</label><input id="trip-start" type="date" value="${esc(existing?.startDate || '')}"></div>
              <div class="field"><label for="trip-end">終了日</label><input id="trip-end" type="date" value="${esc(existing?.endDate || '')}"></div>
            </div>
            <div class="field"><label for="trip-destination">目的地</label><input id="trip-destination" maxlength="100" value="${esc(existing?.destination || '')}" placeholder="例：AIモビリティパーク紫峰"></div>
            <div class="field"><label for="trip-purpose">目的・メモ</label><textarea id="trip-purpose" maxlength="400" placeholder="出張の目的や集合情報など">${esc(existing?.purpose || '')}</textarea></div>
            ${!edit ? `<div class="detail-row"><small>コピー元</small><p>現在のテンプレート ${state.templateItems.length}点を、写真・カテゴリ・メモ付きでコピーします。作成後の変更はテンプレートに影響しません。</p></div>` : ''}
            <div class="modal-actions"><button type="button" class="btn btn-secondary modal-close">キャンセル</button><button type="submit" class="btn btn-primary">${edit ? '保存' : '出張を作成'}</button></div>
          </form>
        `);
        document.getElementById('trip-name').focus();
        document.getElementById('trip-form').addEventListener('submit', e => {
          e.preventDefault();
          const name = document.getElementById('trip-name').value.trim();
          if (!name) return;
          const data = {
            name,
            startDate: document.getElementById('trip-start').value,
            endDate: document.getElementById('trip-end').value,
            destination: document.getElementById('trip-destination').value.trim(),
            purpose: document.getElementById('trip-purpose').value.trim()
          };
          if (data.startDate && data.endDate && data.startDate > data.endDate) {
            toast('終了日は開始日以降に設定してください');
            return;
          }
          if (edit) {
            Object.assign(existing, data, { updatedAt: Date.now() });
            toast('出張情報を更新しました');
          } else {
            const trip = {
              id: cryptoId(),
              ...data,
              createdAt: Date.now(),
              updatedAt: Date.now(),
              items: state.templateItems.map(i => ({
                id: cryptoId(), sourceId: i.id, name: i.name, category: i.category,
                memo: i.memo, photo: i.photo, carried: false, returned: false
              }))
            };
            state.trips.unshift(trip);
            currentTripId = trip.id;
            toast('出張リストを作成しました');
          }
          saveState(); closeModal();
          if (!edit) showPage('tripDetail', currentTripId); else render();
        });
      }

      function openItemModal({ mode, item = null, trip = null }) {
        const edit = Boolean(item);
        let pendingPhoto = item?.photo || '';
        openModal(`
          <div class="modal-head"><h3>${edit ? 'アイテムを編集' : 'アイテムを登録'}</h3><button class="icon-btn modal-close">×</button></div>
          <form id="item-form">
            <div class="field">
              <label>写真（1枚）</label>
              <label class="photo-picker" id="photo-picker">
                ${pendingPhoto ? `<img id="photo-preview" src="${pendingPhoto}" alt="プレビュー">` : `<div class="photo-picker-text" id="photo-placeholder"><div style="font-size:38px">📷</div><strong>タップして写真を選択</strong><span>工具の見た目が分かる写真がおすすめです</span></div>`}
                <input id="item-photo" type="file" accept="image/*">
              </label>
              <div class="field-hint">写真はブラウザ内に保存されます。大きな画像は自動圧縮します。</div>
            </div>
            <div class="field"><label for="item-name">アイテム名 *</label><input id="item-name" required maxlength="80" value="${esc(item?.name || '')}" placeholder="例：トルクレンチ"></div>
            <div class="field"><label for="item-category">カテゴリ</label><input id="item-category" maxlength="50" value="${esc(item?.category || '')}" placeholder="例：工具、電源、電子機器"></div>
            <div class="field"><label for="item-memo">メモ・用途</label><textarea id="item-memo" maxlength="500" placeholder="型番、保管場所、使用上の注意など">${esc(item?.memo || '')}</textarea></div>
            <div class="modal-actions"><button type="button" class="btn btn-secondary modal-close">キャンセル</button><button type="submit" class="btn btn-primary">保存</button></div>
          </form>
        `);

        document.getElementById('item-photo').addEventListener('change', async e => {
          const file = e.target.files?.[0];
          if (!file) return;
          try {
            pendingPhoto = await compressImage(file, 1100, .78);
            document.getElementById('photo-picker').insertAdjacentHTML('afterbegin', `<img id="photo-preview" src="${pendingPhoto}" alt="プレビュー">`);
            document.getElementById('photo-placeholder')?.remove();
            const previews = document.querySelectorAll('#photo-picker #photo-preview');
            previews.forEach((p, idx) => { if (idx < previews.length - 1) p.remove(); });
          } catch (err) {
            console.error(err); toast('画像を読み込めませんでした');
          }
        });
        document.getElementById('item-name').focus();
        document.getElementById('item-form').addEventListener('submit', e => {
          e.preventDefault();
          const data = {
            name: document.getElementById('item-name').value.trim(),
            category: document.getElementById('item-category').value.trim(),
            memo: document.getElementById('item-memo').value.trim(),
            photo: pendingPhoto
          };
          if (!data.name) return;
          if (mode === 'template') {
            if (edit) Object.assign(item, data, { updatedAt: Date.now() });
            else state.templateItems.push({ id: cryptoId(), ...data, createdAt: Date.now() });
          } else if (mode === 'trip' && trip) {
            if (edit) Object.assign(item, data);
            else trip.items.push({ id: cryptoId(), sourceId: null, ...data, carried: false, returned: false });
            trip.updatedAt = Date.now();
          }
          saveState(); closeModal(); toast(edit ? 'アイテムを更新しました' : 'アイテムを追加しました'); render();
        });
      }

      function openAddTripItemModal(trip) {
        openModal(`
          <div class="modal-head"><h3>出張リストに追加</h3><button class="icon-btn modal-close">×</button></div>
          <div style="display:grid;gap:10px">
            <button class="btn btn-primary" id="add-custom-item">＋ 新しいアイテムを作成</button>
            <button class="btn btn-secondary" id="add-from-template">🧰 テンプレートから選択</button>
          </div>
        `);
        document.getElementById('add-custom-item').addEventListener('click', () => { closeModal(); openItemModal({ mode: 'trip', trip }); });
        document.getElementById('add-from-template').addEventListener('click', () => openTemplatePicker(trip));
      }

      function openTemplatePicker(trip) {
        openModal(`
          <div class="modal-head"><h3>テンプレートから追加</h3><button class="icon-btn modal-close">×</button></div>
          ${state.templateItems.length ? `<div style="display:grid;gap:9px">${state.templateItems.map(i => `
            <label style="display:flex;align-items:center;gap:11px;padding:10px;border:1px solid var(--line);border-radius:12px;margin:0">
              <input type="checkbox" class="picker-check" value="${i.id}" style="width:20px;min-height:20px">
              <div style="width:52px;height:52px;border-radius:10px;overflow:hidden;flex:none">${itemImage(i)}</div>
              <div><strong>${esc(i.name)}</strong><div style="color:var(--muted);font-size:12px;margin-top:3px">${esc(i.category || '未分類')}</div></div>
            </label>`).join('')}</div>` : `<p>テンプレートにアイテムがありません。</p>`}
          <div class="modal-actions"><button class="btn btn-secondary modal-close">キャンセル</button><button class="btn btn-primary" id="picker-add" ${state.templateItems.length ? '' : 'disabled'}>選択項目を追加</button></div>
        `);
        document.getElementById('picker-add')?.addEventListener('click', () => {
          const ids = [...document.querySelectorAll('.picker-check:checked')].map(c => c.value);
          if (!ids.length) { toast('追加するアイテムを選択してください'); return; }
          ids.forEach(id => {
            const i = state.templateItems.find(x => x.id === id);
            trip.items.push({ id: cryptoId(), sourceId: i.id, name: i.name, category: i.category, memo: i.memo, photo: i.photo, carried: false, returned: false });
          });
          trip.updatedAt = Date.now(); saveState(); closeModal(); toast(`${ids.length}点を追加しました`); renderTripDetail();
        });
      }

      function openTripItemActions(trip, item) {
        openModal(`
          <div class="modal-head"><h3>${esc(item.name)}</h3><button class="icon-btn modal-close">×</button></div>
          <div style="display:grid;gap:9px">
            <button class="btn btn-secondary" id="trip-item-detail">写真・詳細を見る</button>
            <button class="btn btn-secondary" id="trip-item-edit">この出張内で編集</button>
            <button class="btn btn-danger" id="trip-item-delete">この出張から削除</button>
          </div>
        `);
        document.getElementById('trip-item-detail').addEventListener('click', () => { closeModal(); openItemDetail(item); });
        document.getElementById('trip-item-edit').addEventListener('click', () => { closeModal(); openItemModal({ mode: 'trip', item, trip }); });
        document.getElementById('trip-item-delete').addEventListener('click', () => {
          closeModal();
          openConfirm(`「${item.name}」をこの出張から削除しますか？`, 'テンプレートには影響しません。', () => {
            trip.items = trip.items.filter(i => i.id !== item.id); saveState(); toast('出張リストから削除しました'); renderTripDetail();
          });
        });
      }

      function openItemDetail(item) {
        openModal(`
          <div class="modal-head"><h3>${esc(item.name)}</h3><button class="icon-btn modal-close">×</button></div>
          ${item.photo ? `<img class="detail-photo" src="${item.photo}" alt="${esc(item.name)}の写真">` : `<div class="detail-photo item-placeholder">🧰</div>`}
          <div class="detail-info">
            <div class="detail-row"><small>アイテム名</small><p>${esc(item.name)}</p></div>
            <div class="detail-row"><small>カテゴリ</small><p>${esc(item.category || '未分類')}</p></div>
            <div class="detail-row"><small>メモ・用途</small><p>${esc(item.memo || 'メモはありません')}</p></div>
          </div>
        `);
      }

      function openConfirm(title, message, onConfirm) {
        openModal(`
          <div class="modal-head"><h3>${esc(title)}</h3><button class="icon-btn modal-close">×</button></div>
          <p style="color:var(--muted);line-height:1.7">${esc(message)}</p>
          <div class="modal-actions"><button class="btn btn-secondary modal-close">キャンセル</button><button class="btn btn-danger" id="confirm-ok">削除する</button></div>
        `);
        document.getElementById('confirm-ok').addEventListener('click', () => { closeModal(); onConfirm(); });
      }

      function openModal(content) {
        els.modalRoot.innerHTML = `<div class="modal-backdrop" id="modal-backdrop"><div class="modal" role="dialog" aria-modal="true">${content}</div></div>`;
        const backdrop = document.getElementById('modal-backdrop');
        backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
        document.querySelectorAll('.modal-close').forEach(btn => btn.addEventListener('click', closeModal));
        document.addEventListener('keydown', escClose, { once: true });
      }

      function escClose(e) { if (e.key === 'Escape') closeModal(); }
      function closeModal() { els.modalRoot.innerHTML = ''; }

      function toast(message) {
        const t = document.createElement('div');
        t.className = 'toast'; t.textContent = message;
        els.toastWrap.appendChild(t);
        setTimeout(() => t.remove(), 2400);
      }

      function emptyHtml(icon, title, text, buttonText, buttonId) {
        return `<div class="empty-state"><div class="empty-icon">${icon}</div><h3>${esc(title)}</h3><p>${esc(text)}</p>${buttonText ? `<button class="btn btn-primary" id="${buttonId}">${esc(buttonText)}</button>` : ''}</div>`;
      }

      function compressImage(file, maxSide = 1100, quality = .78) {
        return new Promise((resolve, reject) => {
          if (!file.type.startsWith('image/')) return reject(new Error('画像ファイルではありません'));
          const reader = new FileReader();
          reader.onerror = reject;
          reader.onload = () => {
            const img = new Image();
            img.onerror = reject;
            img.onload = () => {
              const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
              const w = Math.max(1, Math.round(img.width * scale));
              const h = Math.max(1, Math.round(img.height * scale));
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      document.querySelectorAll('[data-page]').forEach(btn => btn.addEventListener('click', () => showPage(btn.dataset.page)));
      render();
    })();
  </script>
</body>
</html>
